# Pre-commit hooks configuration for multipay-adapter
#
# Setup (when multipay-adapter is standalone):
#   pre-commit install
#
# Usage:
#   pre-commit run --all-files              # Run all active hooks
#   pre-commit run <hook-id>                # Run specific hook
#
# To skip hooks temporarily:
#   git commit --no-verify -m "message"
#
# Hook execution order:
#   1. Security (gitleaks)
#   2. Vendor sync (go mod tidy + go mod vendor)
#   3. Build check (verify code compiles)
#   4. Go lint (includes format + golangci-lint with NilAway)
#   5. Go unit tests with coverage

repos:
  # ============================================
  # 1. SECURITY HOOKS (run first)
  # ============================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  # ============================================
  # 2. VENDOR SYNC (ensure vendor/ matches go.mod)
  # ============================================
  - repo: local
    hooks:
      - id: vendor-sync
        name: Vendor sync
        description: Runs make vendor (go mod tidy + go mod vendor) to keep vendor/ consistent
        entry: make vendor
        language: system
        types: [go]
        pass_filenames: false

  # ============================================
  # 3. BUILD CHECK (verify code compiles)
  # ============================================
  - repo: local
    hooks:
      - id: build-check
        name: Build check
        description: Runs make build-check (verifies code compiles without running tests)
        entry: make build-check
        language: system
        types: [go]
        pass_filenames: false

  # ============================================
  # 4. GO LINT (includes format + golangci-lint)
  # ============================================
  - repo: local
    hooks:
      - id: lint-go
        name: Run Go linters
        description: Runs make lint (includes format via goimports + gci, golangci-lint with NilAway)
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false

  # ============================================
  # 5. GO UNIT TESTS WITH COVERAGE
  # ============================================
  - repo: local
    hooks:
      - id: check-go-tests
        name: Run Go unit tests with coverage
        description: Runs make unit-test-coverage (unit tests only, with race detection)
        entry: make unit-test-coverage
        language: system
        types: [go]
        pass_filenames: false