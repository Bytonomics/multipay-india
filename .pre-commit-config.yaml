# Pre-commit hooks for the multipay-india monorepo (run from the repo root).
#
# Setup:
#   pre-commit install
#
# Usage:
#   pre-commit run --all-files          # Run all active hooks
#   pre-commit run <hook-id>            # Run a specific hook
#
# To skip hooks temporarily:
#   git commit --no-verify -m "message"
#
# Hook execution order:
#   1. Security (gitleaks) — repo-wide
#   2. Go vendor sync (go mod tidy + go mod vendor)
#   3. Go build check (verify code compiles)
#   4. Go lint (format via goimports + gci, golangci-lint with NilAway)
#   5. Go unit tests with coverage
#   6. TypeScript frontend install (npm install — sync lockfile + install deps) — runs FIRST among TS hooks
#   7. TypeScript frontend check (typecheck + lint + test)
#
# The Go hooks run inside the multipay-go/ subdirectory via `make -C multipay-go ...`.
# The TS hooks run inside multipay-frontend-ts/ via `make -C multipay-frontend-ts ...`.
# As multipay-ts / multipay-py ports are implemented, add their hooks here scoped to
# their file types.

repos:
  # ============================================
  # 1. SECURITY HOOKS (run first, repo-wide)
  # ============================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ============================================
  # 2-5. GO HOOKS (scoped to .go files, run inside multipay-go/)
  # ============================================
  - repo: local
    hooks:
      - id: go-vendor-sync
        name: Go vendor sync
        description: Runs make -C multipay-go vendor (go mod tidy + go mod vendor) to keep vendor/ consistent
        entry: make -C multipay-go vendor
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build-check
        name: Go build check
        description: Runs make -C multipay-go build-check (verifies code compiles without running tests)
        entry: make -C multipay-go build-check
        language: system
        types: [go]
        pass_filenames: false

      - id: go-lint
        name: Go lint
        description: Runs make -C multipay-go lint (goimports + gci, golangci-lint with NilAway)
        entry: make -C multipay-go lint
        language: system
        types: [go]
        pass_filenames: false

      - id: go-unit-tests
        name: Go unit tests with coverage
        description: Runs make -C multipay-go unit-test-coverage (unit tests with race detection)
        entry: make -C multipay-go unit-test-coverage
        language: system
        types: [go]
        pass_filenames: false

  # ============================================
  # 6. TYPESCRIPT HOOKS (scoped to .ts/.tsx files, run inside multipay-frontend-ts/)
  # ============================================
  - repo: local
    hooks:
      - id: frontend-ts-install
        name: TypeScript frontend install (sync lockfile)
        description: Runs make -C multipay-frontend-ts install (npm install) FIRST so package.json/package-lock.json drift is reconciled and node_modules (incl. @types/react) is present before typecheck/lint/test. If npm install rewrites package-lock.json, pre-commit aborts so the synced lockfile must be committed.
        entry: make -C multipay-frontend-ts install
        language: system
        files: ^multipay-frontend-ts/(src/.*\.(ts|tsx)|tests/.*\.(ts|tsx)|package\.json|package-lock\.json)$
        pass_filenames: false

      - id: frontend-ts-check
        name: TypeScript frontend check
        description: Runs make -C multipay-frontend-ts check (typecheck + lint + test)
        entry: make -C multipay-frontend-ts check
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
